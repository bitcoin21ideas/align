name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. n8n Workflow Validation
      - name: Validate n8n workflow JSON
        run: |
          # Check JSON syntax
          python3 -c "import json; json.load(open('workflows/walks-processing.json'))"
          echo "✓ workflows/walks-processing.json is valid JSON"

      - name: Check n8n workflow invariants
        run: |
          python3 << 'EOF'
          import json
          import sys

          path = "workflows/walks-processing.json"
          with open(path) as f:
              raw = f.read()
          workflow = json.loads(raw)

          types = [n.get("type") for n in workflow.get("nodes", [])]

          # Align uses Webhook → HTTP Request (Deepgram) → LangChain Gemini, not legacy node type names.
          if "n8n-nodes-base.webhook" not in types:
              print("ERROR: Missing n8n-nodes-base.webhook")
              sys.exit(1)
          if "n8n-nodes-base.httpRequest" not in types:
              print("ERROR: Missing n8n-nodes-base.httpRequest (Deepgram is called via HTTP)")
              sys.exit(1)
          if "api.deepgram.com" not in raw:
              print("ERROR: Workflow must include the Deepgram listen URL")
              sys.exit(1)
          if "@n8n/n8n-nodes-langchain.googleGemini" not in types:
              print("ERROR: Missing @n8n/n8n-nodes-langchain.googleGemini")
              sys.exit(1)
          if "prompts/gemini-main.md" not in raw:
              print("ERROR: Workflow must load the system prompt from prompts/gemini-main.md (GitHub path)")
              sys.exit(1)

          gemini = next(
              (n for n in workflow["nodes"] if n.get("type") == "@n8n/n8n-nodes-langchain.googleGemini"),
              None,
          )
          params = json.dumps(gemini.get("parameters", {}), separators=(",", ":"))
          if len(params) > 40000:
              print(
                  "ERROR: Gemini node parameters are unexpectedly large; "
                  "keep the full system prompt in prompts/gemini-main.md"
              )
              sys.exit(1)

          print("✓ Workflow structure, Deepgram URL, prompt path, and Gemini size checks passed")
          EOF

      - name: Check for hardcoded API keys in workflow
        run: |
          python3 << 'PY'
          import re
          import sys

          text = open("workflows/walks-processing.json", encoding="utf-8").read()
          # JSON-ish "key": "long-alphanumeric-value" (avoid bash/grep quoting bugs in CI)
          pat = re.compile(
              r'(?i)(api[_-]?key|token|password|secret)\s*:\s*["\']\s*([a-z0-9]{20,})\s*["\']',
              re.MULTILINE,
          )
          if pat.search(text):
              print("ERROR: Potential hardcoded API key or token in workflow JSON")
              sys.exit(1)
          print("✓ No obvious API keys in workflow")
          PY

      # 2. Prompt Validation
      - name: Validate Gemini prompt file
        run: |
          if [ ! -f "prompts/gemini-main.md" ]; then
            echo "ERROR: prompts/gemini-main.md is missing"
            exit 1
          fi

          if [ ! -s "prompts/gemini-main.md" ]; then
            echo "ERROR: prompts/gemini-main.md is empty"
            exit 1
          fi

          # Check for expected sections
          for section in "OUTPUT 1" "OUTPUT 2" "OUTPUT 3" "OUTPUT 4"; do
            if ! grep -q "$section" prompts/gemini-main.md; then
              echo "WARNING: Missing $section section in prompt"
            fi
          done

          echo "✓ prompts/gemini-main.md exists and has content"

      # 3. CHANGELOG Enforcement
      - name: Check CHANGELOG updated for relevant changes
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1

          # Check if workflows/ or prompts/ were modified
          if git diff --name-only origin/${{ github.base_ref }} | grep -qE '^(workflows/|prompts/)'; then
            # These files were changed — CHANGELOG must be too
            if ! git diff --name-only origin/${{ github.base_ref }} | grep -q '^CHANGELOG.md$'; then
              echo "ERROR: Changes to workflows/ or prompts/ require CHANGELOG.md update"
              echo "Per CLAUDE.md: 'On every git commit, update CHANGELOG.md'"
              exit 1
            fi
          fi
          echo "✓ CHANGELOG check passed"

      # 4. Documentation Linting (optional, lightweight)
      - name: Check markdown formatting
        run: |
          # Check for broken internal links (e.g., [text](docs/file.md))
          for file in $(find . -name '*.md' -not -path './.cursor/*'); do
            dir=$(dirname "$file")
            grep -oE '\[([^]]+)\]\(([^)]+\.md)\)' "$file" | while read -r match; do
              link=$(echo "$match" | sed -E 's/.*\]\((.*\.md)\)/\1/')
              # Resolve relative to the file's directory
              if [[ "$link" == /* ]]; then
                target=".$link"
              else
                target="$dir/$link"
              fi
              if [ ! -f "$target" ]; then
                echo "WARNING: Broken link in $file: $link"
              fi
            done
          done
          echo "✓ Link check complete"

      # 5. Schema Validation (if memory files exist in repo)
      - name: Validate memory entry schemas
        run: |
          if [ -d "memory" ]; then
            for f in memory/*.json; do
              [ -e "$f" ] || continue
              python3 -c "import json; json.load(open('$f'))" || {
                echo "ERROR: Invalid JSON in $f"
                exit 1
              }
            done
            echo "✓ Memory entries are valid JSON"
          else
            echo "ℹ No memory/ directory — skipping schema validation"
          fi
